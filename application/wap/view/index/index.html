<style>
    body{
        padding-bottom: 150px;
    }
    /**-------------------top start-------------**/
    .top{
        line-height: 36px;
        height: 36px;
        background-color: #07c6fd;
    }
    .top .pos{
        width: 50px;
        text-align: center;
        color: #fff;
        float: left;
    }
    .top .search{
        width: calc(100% - 100px);
        padding: 2px 0;
        /*float: left;*/
        margin: 0 auto;
    }
    .top .search input{
        width: 100%;
        height: 32px;
        line-height: 32px;
        border: 0;
        float: left;
    }
    .top .msg{
        width: 50px;
        text-align: center;
        color: #fff;
        float: left;
    }
    .top .msg a{
        color: #fff;
    }
    /**-------------------top end-------------**/
    /**-------------------menu start-------------**/
    .menu{
        padding: 20px 0;
        overflow: hidden;
    }
    .menu ul li{
        width: 100px;
        float: left;
        text-align: center;
    }
    .menu ul li a i{
        font-size: 24px;
        width: 100%;
        line-height: 30px;
        display: inline-block;
    }
    .menu ul li a span{
        font-size: 14px;
        width: 100%;
        line-height: 30px;
        display: inline-block;
    }
    /**-------------------menu end-------------**/
    /**-------------------notice start-------------**/
    .notice{
        padding: 8px 15px;
        overflow: hidden;
        margin-bottom: 8px;
        border: 1px solid #ddd;
        border-width: 1px 0;
    }
    .notice .title{
        width: 50px;
        line-height: 25px;
        text-align: center;
        border: 1px solid #ccc;
        font-size: 14px;
        background-color: #fff;
        float: left;
    }
    .notice .notice-con{
        width: calc(100% - 60px);
        color: red;
        font-size: 12px;
        padding: 4px 5px;
        line-height: 20px;
        margin-left: 10px;
        background-color: #eee;
        float: left;
    }
    .notice .notice-con span{
        color: #999;
    }
    /**-------------------notice end-------------**/
</style>
