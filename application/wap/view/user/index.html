<style>
    body{
        padding-bottom: 150px;
    }
    /******************** top start *******************/
    .top{
        width: 100%;
        background-color: #07c6fd;
        height: 80px;
        position: relative;
    }
    .top .user-set{
        position: absolute;
        left: 15px;
        top: 15px;
    }
    .top .user-set a{
        color: #fff;
    }
    .top .user-set i{
        width: 30px;
        height: 30px;
        display: block;
    }
    /******************** top end *******************/
    /******************** user-info start *******************/
    .user-info{
        width: calc(100% - 30px);
        margin: 0 auto;
        border: 1px solid #ccc;
        padding: 20px;
        border-radius: 10px;
        position: relative;
        top: -30px;
        background-color: #fff;
        overflow: hidden;
    }
    .user-info .face-img{
        width: 60px;
        height: 60px;
        border-radius: 50%;
        overflow: hidden;
        float: left;
        position: absolute;
        top: 14px;
    }
    .user-info .face-img img{
        width: 100%;
        height: 100%;
    }
    .user-info .detail-info{
        width: calc(100% - 60px);
        float: left;
        line-height: 24px;
        padding: 0 0 0 10px;
        margin-left: 60px;
    }
    .user-info .bind-phone{
        font-size: 12px;
    }
    .user-info .detail-info div{
        width: 100%;
    }
    .user-info .detail-info .set-detail{
        font-size: 12px;
    }
    .user-info .detail-info .set-detail a{
        font-size: 12px;
    }
    .user-info .detail-info .set-detail a i{
        vertical-align: middle;
    }
    .user-info .detail-info .set-detail span{
        font-weight: bold;
    }
    /******************** user-info end *******************/
    /******************** menu-item start *******************/
    .menu-item{
        padding: 0 15px;
        border-bottom: 1px solid #ccc;
        line-height: 48px;
        position: relative;
    }
    .menu-item .icon{
        position: absolute;
        top: 0;
        right: 15px;
    }
    /******************** menu-item end *******************/
</style>
<div class="top">
    <div class="user-set">
        <a href="{:url('User/userSet')}">
            <i class="iconfont icon-shezhi"></i>
        </a>
    </div>
</div>
<div class="user-info">
    <div class="face-img">
        <img src="https://timgsa.baidu.com/timg?image&quality=80&size=b9999_10000&sec=1542878685250&di=710d3294da184336a7e79af86f782b37&imgtype=0&src=http%3A%2F%2Fimg5q.duitang.com%2Fuploads%2Fitem%2F201502%2F08%2F20150208135955_M55QZ.jpeg" alt="" />
    </div>
    <div class="detail-info">
        <div class="user-name">
            <a href="{:url('User/setBasicInfo')}?source=User__index">{$user_info.name}</a>
        </div>
        <div class="set-detail">
            <a href="{:url('User/setBasicInfo')}?source=User__index">
                <i class="iconfont icon-shezhi1"></i>
            {if empty($user_info['name'])}
                <span style="color: red;">未设置</span>
            {else/}
                <span style="color: green;">已设置</span>
            {/if}
            </a>&nbsp;&nbsp;&nbsp;&nbsp;
            <a href="{:url('User/setPhone')}?source=User__index">
                <i class="iconfont icon-shouji1"></i>
                {if $user_info['phone'] == '111'}
                <span style="color: red;">未绑定</span>
                {else/}
                <span style="color: green;">已绑定</span>
                {/if}
            </a>
        </div>
    </div>
</div>
<div class="menu-item">
    <a href="{:url('Manager/feeList')}">
        <div class="menu-name">我的账单</div>
        <div class="icon">
            <i class="iconfont icon-dingdan"></i>
        </div>
    </a>
</div>
<div class="menu-item">
    <a href="{:url('User/myFamily')}">
        <div class="menu-name">我的家庭成员/租客</div>
        <div class="icon">
            <i class="iconfont icon-hunyinjiating"></i>
        </div>
    </a>
</div>

<div class="menu-item">
    <a href="{:url('User/aboutUs')}">
        <div class="menu-name">关于我们</div>
        <div class="icon">
            <i class="iconfont icon-about"></i>
        </div>
    </a>
</div>
